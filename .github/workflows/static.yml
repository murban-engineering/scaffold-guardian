name: Deploy static content to Pages

on:
  push:
    # Support repos that still use `master` as the default branch.
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure GitHub Pages base path
        run: |
          if [ -n "${{ vars.PAGES_CUSTOM_DOMAIN }}" ]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${GITHUB_REPOSITORY#*/}/" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://iairnfnjoyxhrkbyigud.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhaXJuZm5qb3l4aHJrYnlpZ3VkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk2MDc4MjAsImV4cCI6MjA4NTE4MzgyMH0.cOCyH-r8FWC1JPWhZcmBibLqX7lKTdUAbRVjqP2_xlw

      - name: Add SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Add custom domain (optional)
        if: ${{ vars.PAGES_CUSTOM_DOMAIN != '' }}
        run: echo "${{ vars.PAGES_CUSTOM_DOMAIN }}" > dist/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
